<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthFit - Kids Fitness Screening</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="app-container">
        <!-- Screen 1: Onboarding -->
        <div id="screen-onboarding" class="screen active">
            <header class="app-header">
                <h1>GrowthFit 🌟</h1>
                <p>ระบบคัดกรองเตรียมความพร้อมออกกำลังกาย</p>
            </header>
            
            <form id="onboarding-form" class="glass-card">
                <div class="form-group">
                    <label for="child-name">ชื่อ-นามสกุล</label>
                    <input type="text" id="child-name" placeholder="ชื่อน้องๆ" required>
                </div>
                <div class="form-group">
                    <label>เพศ</label>
                    <div class="gender-selector">
                        <input type="radio" id="gender-male" name="gender" value="male" required>
                        <label for="gender-male" class="gender-btn male-btn">👦 ชาย</label>
                        
                        <input type="radio" id="gender-female" name="gender" value="female" required>
                        <label for="gender-female" class="gender-btn female-btn">👧 หญิง</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="birth-date">วันเกิด (เพื่อประมวลผลอายุอัตโนมัติ)</label>
                    <input type="date" id="birth-date" required>
                </div>
                <div class="form-group row">
                    <div class="col">
                        <label for="weight">น้ำหนัก (กก.)</label>
                        <input type="number" id="weight" step="0.1" required>
                    </div>
                    <div class="col">
                        <label for="height">ส่วนสูง (ซม.)</label>
                        <input type="number" id="height" step="0.1" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">เริ่มการทดสอบ 🚀</button>
            </form>
        </div>

        <!-- Screen 2: Test Dashboard -->
        <div id="screen-dashboard" class="screen">
            <header class="app-header">
                <button id="btn-back" class="btn-icon">🔙</button>
                <h1 id="dashboard-title">รายการทดสอบ</h1>
                <div class="profile-badge">
                    <span id="display-name">ชื่อน้อง</span>
                    <span class="badge" id="display-group">อายุ 5 ปี (กลุ่ม 1)</span>
                </div>
            </header>
            
            <div id="test-list" class="test-list">
                <!-- Test items will be injected here via JS -->
            </div>
            
            <button id="btn-submit-tests" class="btn-primary mt-20">ประมวลผลลัพธ์ 📊</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
